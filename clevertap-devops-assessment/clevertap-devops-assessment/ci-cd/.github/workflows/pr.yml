# =============================================================================
# PR Pipeline — Lint · Unit Tests · SAST · Container Build · ECR Push
# =============================================================================
# Triggers on every PR opened/updated against main or release/* branches.
# All secrets are injected via OIDC → AWS Secrets Manager at runtime.
# No hardcoded credentials anywhere in this file.
# =============================================================================

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - "release/*"
    types: [opened, synchronize, reopened]

permissions:
  id-token: write   # OIDC token for AWS AssumeRoleWithWebIdentity
  contents: read
  pull-requests: write  # Post check summaries as PR comments
  security-events: write  # Upload SARIF results to GitHub Security tab

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true  # Cancel stale runs when new commits are pushed

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  SERVICE_NAME: event-ingestion-service
  GO_VERSION: "1.21"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56.2
          args: --timeout=5m --out-format=github-actions

      - name: Terraform fmt check
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - run: terraform fmt -check -recursive ./terraform/

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests with coverage enforcement
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with race detector
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Enforce coverage threshold (80%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below minimum 80%"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: SAST — Semgrep + Trivy filesystem scan
  # ---------------------------------------------------------------------------
  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/golang
            p/secrets
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Trivy filesystem scan (secrets + vulns in source)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

  # ---------------------------------------------------------------------------
  # Job 4: Container build + image scan + ECR push
  # Runs only after lint, tests, and SAST pass.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, sast]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActionsPushToECR
          aws-region: ${{ env.AWS_REGION }}
          # Session tagging for CloudTrail auditability
          role-session-name: gh-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          IMAGE_TAG="${{ env.SERVICE_NAME }}:pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push yet — scan first)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.full_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.short_sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.full_image }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload image scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      - name: Push image to ECR
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.full_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post image tag to PR comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ✅ Image Built & Pushed\n\`${process.env.FULL_IMAGE}\`\nDigest: \`${{ steps.push.outputs.digest }}\``
            })
        env:
          FULL_IMAGE: ${{ steps.meta.outputs.full_image }}
